<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DIIP{% endblock %} — Digital Infrastructure Intelligence Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon">
            <i class="bi bi-diagram-3-fill"></i>
        </div>
        <div class="brand-text">
            <span class="brand-name">DIIP</span>
            <span class="brand-sub">Infrastructure</span>
        </div>
    </div>

    <hr class="sidebar-divider">

    <nav class="sidebar-nav">
        <a href="/" class="nav-item {% if request.url.path == '/' %}active{% endif %}">
            <i class="bi bi-grid-1x2-fill"></i>
            <span>Dashboard</span>
        </a>
        <a href="/inventory" class="nav-item {% if request.url.path == '/inventory' %}active{% endif %}">
            <i class="bi bi-server"></i>
            <span>Inventar</span>
        </a>
        <a href="/scan" class="nav-item {% if request.url.path == '/scan' %}active{% endif %}">
            <i class="bi bi-radar"></i>
            <span>Scanare</span>
        </a>
        <a href="/alerts" class="nav-item {% if request.url.path == '/alerts' %}active{% endif %}">
            <i class="bi bi-bell-fill"></i>
            <span>Alerte</span>
            <span class="badge-alert" id="nav-alert-count" style="display:none"></span>
        </a>
    </nav>

    <hr class="sidebar-divider">

    <div class="sidebar-footer">
        <div class="db-status">
            <span class="status-dot dot-online"></span>
            <span class="status-text">SQL Server conectat</span>
        </div>
        <div class="app-version">v1.0.0</div>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- HEADER -->
    <div class="top-header">
        <div class="page-title">
            <h1>{% block page_title %}Dashboard{% endblock %}</h1>
            <p class="page-subtitle">{% block page_subtitle %}{% endblock %}</p>
        </div>

        <div class="header-actions">

            <!-- Alerte -->
            <div class="alert-bell" onclick="window.location='/alerts'" title="Alerte">
                <i class="bi bi-bell"></i>
                <span class="bell-badge" id="bell-badge" style="display:none">0</span>
            </div>

            <!-- Timestamp -->
            <div class="last-updated">
                <i class="bi bi-clock"></i>
                <span id="last-updated-time">--:--</span>
            </div>

            <!-- Dark/Light mode -->
            <div class="theme-toggle" onclick="toggleTheme()" title="Schimbă tema">
                <i class="bi bi-sun-fill" id="theme-icon"></i>
            </div>

            <!-- User info + Logout -->
            <div class="header-user">
                <span class="header-username" id="header-username">
                    <i class="bi bi-person-circle"></i>
                    <span id="username-text">...</span>
                    <span class="role-pill" id="role-pill"></span>
                </span>
                <button class="btn-logout" onclick="doLogout()" title="Logout">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </div>

        </div>
    </div>

    <!-- PAGE CONTENT -->
    <div class="page-content">
        {% block content %}{% endblock %}
    </div>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script>
// ── Timestamp ─────────────────────────────────────────────────
function updateTimestamp() {
    const now  = new Date();
    const time = now.toLocaleTimeString('ro-RO', {hour: '2-digit', minute: '2-digit'});
    document.getElementById('last-updated-time').textContent = time;
}
updateTimestamp();
setInterval(updateTimestamp, 60000);

// ── Alerte necitite ───────────────────────────────────────────
async function loadUnreadAlerts() {
    try {
        const resp  = await fetch('/api/alerts?unread_only=true');
        const data  = await resp.json();
        const count = data.alerts ? data.alerts.length : 0;
        const bellBadge     = document.getElementById('bell-badge');
        const navAlertCount = document.getElementById('nav-alert-count');
        if (count > 0) {
            bellBadge.textContent       = count;
            bellBadge.style.display     = 'flex';
            navAlertCount.textContent   = count;
            navAlertCount.style.display = 'flex';
        } else {
            bellBadge.style.display     = 'none';
            navAlertCount.style.display = 'none';
        }
    } catch (e) {}
}
loadUnreadAlerts();
setInterval(loadUnreadAlerts, 30000);

// ── Dark/Light mode ───────────────────────────────────────────
function toggleTheme() {
    const body = document.body;
    const icon = document.getElementById('theme-icon');
    body.classList.toggle('light-mode');
    if (body.classList.contains('light-mode')) {
        icon.className = 'bi bi-moon-fill';
        localStorage.setItem('theme', 'light');
    } else {
        icon.className = 'bi bi-sun-fill';
        localStorage.setItem('theme', 'dark');
    }
}
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'light') {
    document.body.classList.add('light-mode');
    document.getElementById('theme-icon').className = 'bi bi-moon-fill';
}

// ── User curent in header ─────────────────────────────────────
async function loadCurrentUser() {
    try {
        const resp = await fetch('/api/auth/me');
        const data = await resp.json();
        if (data.authenticated) {
            document.getElementById('username-text').textContent = data.user.username;
            const pill = document.getElementById('role-pill');
            pill.textContent  = data.user.role;
            pill.className    = 'role-pill role-' + data.user.role;
        }
    } catch (e) {}
}
loadCurrentUser();

// ── Logout ────────────────────────────────────────────────────
async function doLogout() {
    try {
        await fetch('/api/auth/logout', { method: 'POST' });
    } catch(e) {}
    window.location.href = '/login';
}
</script>

{% block scripts %}{% endblock %}
</body>
</html>
