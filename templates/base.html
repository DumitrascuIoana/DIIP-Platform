<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DIIP{% endblock %} — Digital Infrastructure Intelligence Platform</title>

    <!-- Bootstrap 5 — grid, componente UI -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS-ul nostru -->
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>

<!-- ============================================================
     SIDEBAR — navigare principală
     ============================================================ -->
<div class="sidebar">

    <!-- Logo -->
    <div class="sidebar-brand">
        <div class="brand-icon">
            <i class="bi bi-diagram-3-fill"></i>
        </div>
        <div class="brand-text">
            <span class="brand-name">DIIP</span>
            <span class="brand-sub">Infrastructure</span>
        </div>
    </div>

    <hr class="sidebar-divider">

    <!-- Meniu navigare -->
    <nav class="sidebar-nav">
        <a href="/" class="nav-item {% if request.url.path == '/' %}active{% endif %}">
            <i class="bi bi-grid-1x2-fill"></i>
            <span>Dashboard</span>
        </a>
        <a href="/inventory" class="nav-item {% if request.url.path == '/inventory' %}active{% endif %}">
            <i class="bi bi-server"></i>
            <span>Inventar</span>
        </a>
        <a href="/scan" class="nav-item {% if request.url.path == '/scan' %}active{% endif %}">
            <i class="bi bi-radar"></i>
            <span>Scanare</span>
        </a>
        <a href="/alerts" class="nav-item {% if request.url.path == '/alerts' %}active{% endif %}">
            <i class="bi bi-bell-fill"></i>
            <span>Alerte</span>
            <!-- Badge alerte necitite — actualizat din JS -->
            <span class="badge-alert" id="nav-alert-count" style="display:none"></span>
        </a>
    </nav>

    <hr class="sidebar-divider">

    <!-- Status DB — jos în sidebar -->
    <div class="sidebar-footer">
        <div class="db-status" id="db-status">
            <span class="status-dot dot-online"></span>
            <span class="status-text">SQL Server conectat</span>
        </div>
        <div class="app-version">v1.0.0</div>
    </div>
</div>

<!-- ============================================================
     CONȚINUT PRINCIPAL
     ============================================================ -->
<div class="main-content">

    <!-- Header top -->
    <div class="top-header">
        <div class="page-title">
            <h1>{% block page_title %}Dashboard{% endblock %}</h1>
            <p class="page-subtitle">{% block page_subtitle %}{% endblock %}</p>
        </div>
        <div class="header-actions">
            <!-- Iconița de alerte cu badge -->
            <div class="alert-bell" onclick="window.location='/alerts'">
                <i class="bi bi-bell"></i>
                <span class="bell-badge" id="bell-badge" style="display:none">0</span>
            </div>
            <!-- Timestamp ultima actualizare -->
            <div class="last-updated">
                <i class="bi bi-clock"></i>
                <span id="last-updated-time">--:--</span>
            </div>
        </div>
    </div>

    <!-- Conținutul paginii curente -->
    <div class="page-content">
        {% block content %}{% endblock %}
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js — grafice -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script>
// ============================================================
// Script global — rulează pe toate paginile
// ============================================================

// Actualizează timestamp-ul din header
function updateTimestamp() {
    const now  = new Date();
    const time = now.toLocaleTimeString('ro-RO', {hour: '2-digit', minute: '2-digit'});
    document.getElementById('last-updated-time').textContent = time;
}
updateTimestamp();

// Încarcă numărul de alerte necitite și actualizează badge-urile
async function loadUnreadAlerts() {
    try {
        const resp = await fetch('/api/alerts?unread_only=true');
        const data = await resp.json();
        const count = data.alerts ? data.alerts.length : 0;

        const bellBadge     = document.getElementById('bell-badge');
        const navAlertCount = document.getElementById('nav-alert-count');

        if (count > 0) {
            bellBadge.textContent     = count;
            bellBadge.style.display   = 'flex';
            navAlertCount.textContent = count;
            navAlertCount.style.display = 'flex';
        } else {
            bellBadge.style.display   = 'none';
            navAlertCount.style.display = 'none';
        }
    } catch (e) {
        console.error('Nu am putut încărca alertele:', e);
    }
}
loadUnreadAlerts();

// Reîncarcă alertele la fiecare 30 secunde
setInterval(loadUnreadAlerts, 30000);
setInterval(updateTimestamp, 60000);
</script>

{% block scripts %}{% endblock %}
</body>
</html>
