<!DOCTYPE html>
<html>
<head>
    <title>IT Infrastructure Dashboard</title>
</head>
<body>
    <h1>Devices</h1>
    <table border="1">
        <tr>
            <th>IP</th>
            <th>Status</th>
            <th>Last Seen</th>
        </tr>
        {% for d in devices %}
        <tr>
            <td>{{ d[0] }}</td>
            <td>{{ d[1] }}</td>
            <td>{{ d[2] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
